services:
  postgres:
    image: postgres:16-alpine
    container_name: bob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bob}
      POSTGRES_USER: ${POSTGRES_USER:-bob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bob}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bob} -d ${POSTGRES_DB:-bob}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
