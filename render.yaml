services:
  - type: web
    name: bob-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: BOB_AUTH_JWT_SECRET
        sync: false
      - key: BOB_AUTH_JWT_EXPIRATION_MINUTES
        value: 480
      - key: BOB_APP_VERSION
        value: 0.1.0
      - key: BOB_AI_ENABLED
        value: false
      - key: BOB_AI_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
