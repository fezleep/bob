spring:
  application:
    name: bob-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bob}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:bob}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:bob}}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

bob:
  app:
    name: bob
    version: ${BOB_APP_VERSION:0.1.0}
